version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: newsimpact-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsimpact
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newsimpact-network

  redis:
    image: redis:7-alpine
    container_name: newsimpact-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newsimpact-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  newsimpact-network:
    driver: bridge
